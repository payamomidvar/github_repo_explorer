name: github_repo_explorer
description: "A GitHub repo/user explorer built with Clean Architecture and Riverpod."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.2"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  dio: ^5.9.2
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.3
  equatable: ^2.0.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  mocktail: ^1.0.5
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true



